name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend_changed }}
      frontend_changed: ${{ steps.filter.outputs.frontend_changed }}
      docker_changed: ${{ steps.filter.outputs.docker_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            changed_files="$(git diff --name-only "origin/$BASE_REF"...HEAD)"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          else
            changed_files="$(git ls-tree -r --name-only "$CURRENT_SHA")"
          fi

          backend_changed=false
          frontend_changed=false
          docker_changed=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              backend/*|requirements.txt|.github/workflows/ci.yml)
                backend_changed=true
                ;;
              frontend/*|.github/workflows/ci.yml)
                frontend_changed=true
                ;;
              Dockerfile|.dockerignore|deployments/*|scripts/deploy.sh|requirements.txt|.github/workflows/ci.yml)
                docker_changed=true
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"
          echo "docker_changed=$docker_changed" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend tests
    needs: changes
    if: needs.changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend unit tests
        run: PYTHONPATH=backend pytest backend/tests/unit

  frontend:
    name: Frontend build and tests
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker build validation
    needs: changes
    if: needs.changes.outputs.docker_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vnpy-web-bridge:test
