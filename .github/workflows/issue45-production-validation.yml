name: Issue 45 Production Monitoring Validation

on:
  workflow_dispatch:
    inputs:
      environment_stage:
        description: "Environment lifecycle stage"
        required: true
        type: choice
        options:
          - production
          - testing
        default: production
      confirmation:
        description: "Type ISSUE45_PRODUCTION, or ISSUE45_TESTING for the explicit testing-stage override"
        required: true
        default: ""

concurrency:
  group: vnpy-web-bridge-production-validation
  cancel-in-progress: false

jobs:
  validate:
    name: Run guarded production monitoring drills
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Require repository owner and explicit confirmation
        env:
          ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          ENVIRONMENT_STAGE: ${{ inputs.environment_stage }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$REPOSITORY_OWNER" = "folgercn" || {
            echo "repository owner is not allowed" >&2
            exit 2
          }
          test "$ACTOR" = "folgercn" || {
            echo "workflow actor is not allowed" >&2
            exit 2
          }
          case "$ENVIRONMENT_STAGE" in
            production) expected="ISSUE45_PRODUCTION" ;;
            testing) expected="ISSUE45_TESTING" ;;
            *) echo "unsupported environment stage" >&2; exit 2 ;;
          esac
          test "$CONFIRMATION" = "$expected" || {
            echo "confirmation does not match environment stage" >&2
            exit 2
          }

      - name: Checkout validation revision
        uses: actions/checkout@v4

      - name: Run production validation and fault drills
        env:
          PATH: /Applications/Docker.app/Contents/Resources/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ENVIRONMENT_STAGE: ${{ inputs.environment_stage }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          python3 scripts/monitoring_production_validation.py \
            --mode full \
            --environment-stage "$ENVIRONMENT_STAGE" \
            --confirm "$CONFIRMATION" \
            --deploy-path "${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}" \
            --output artifacts/issue-45-production-validation.json \
            --markdown-output artifacts/issue-45-production-validation.md

      - name: Upload sanitized validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-45-production-validation-${{ github.run_id }}
          path: artifacts/issue-45-production-validation.*
          if-no-files-found: warn
          retention-days: 30
