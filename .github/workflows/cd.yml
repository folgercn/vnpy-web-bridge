name: CD

on:
  workflow_dispatch:
    inputs:
      deploy_services:
        description: "Space-separated compose services to deploy. Empty uses safe defaults."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/cd.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - "test_rpc_readonly.py"
      - "test_rpc_trade_flow.py"
      - "deployments/**"
      - "scripts/deploy.sh"

jobs:
  changes:
    name: Detect changed areas
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    outputs:
      image_changed: ${{ steps.filter.outputs.image_changed }}
      deploy_services: ${{ steps.filter.outputs.deploy_services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          INPUT_DEPLOY_SERVICES: ${{ inputs.deploy_services }}
        run: |
          validate_deploy_services() {
            for service in $1; do
              case "$service" in
                web-bridge) ;;
                *)
                  echo "Unsupported deploy_services entry: $service" >&2
                  echo "Allowed services: web-bridge" >&2
                  exit 2
                  ;;
              esac
            done
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_DEPLOY_SERVICES:-}" ]; then
              validate_deploy_services "$INPUT_DEPLOY_SERVICES"
              deploy_services="$INPUT_DEPLOY_SERVICES"
            else
              deploy_services="web-bridge"
            fi
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "$CURRENT_SHA")"
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          image_changed=false
          deploy_services=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              Dockerfile|.dockerignore|backend/*|frontend/*|test_rpc_readonly.py|test_rpc_trade_flow.py|deployments/*|scripts/deploy.sh|.github/workflows/cd.yml)
                image_changed=true
                deploy_services="web-bridge"
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "image_changed=$image_changed" >> "$GITHUB_OUTPUT"
          echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build and deploy on Macmini
    needs: changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.image_changed == 'true' && needs.changes.outputs.deploy_services != ''
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
            printf '%s\n' "$DEPLOY_ENV_FILE" > .deploy.env
          elif [ -f backend/.env ]; then
            cp backend/.env .deploy.env
          else
            echo "Missing deploy env. Add GitHub secret DEPLOY_ENV_FILE or keep backend/.env on the self-hosted runner." >&2
            exit 1
          fi
          chmod 600 .deploy.env

      - name: Prepare deployment directory
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          mkdir -p "$path/deployments" "$path/scripts" "$path/logs"
          cp deployments/docker-compose.prod.yml "$path/deployments/docker-compose.prod.yml"
          cp scripts/deploy.sh "$path/scripts/deploy.sh"
          cp .deploy.env "$path/.env"
          chmod +x "$path/scripts/deploy.sh"
          chmod 600 "$path/.env"

      - name: Build image on Macmini
        timeout-minutes: 20
        env:
          IMAGE_REPO: vnpy-web-bridge
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          export PATH="/Applications/Docker.app/Contents/Resources/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:${PATH:-}"
          docker build --progress=plain -t "${IMAGE_REPO}:${IMAGE_TAG}" -t "${IMAGE_REPO}:latest" .

      - name: Deploy via docker compose
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REPO: vnpy-web-bridge
          IMAGE_TAG: sha-${{ github.sha }}
          DEPLOY_SERVICES: ${{ needs.changes.outputs.deploy_services }}
          DEPLOY_SKIP_PULL: "true"
        run: |
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          DEPLOY_PATH="$path" IMAGE_REPO="$IMAGE_REPO" IMAGE_TAG="$IMAGE_TAG" DEPLOY_SERVICES="$DEPLOY_SERVICES" DEPLOY_SKIP_PULL="$DEPLOY_SKIP_PULL" bash "$path/scripts/deploy.sh"
