name: CD

on:
  workflow_dispatch:
    inputs:
      deploy_services:
        description: "Space-separated compose services to deploy. Empty uses safe defaults."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/cd.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - "test_rpc_readonly.py"
      - "test_rpc_trade_flow.py"
      - "deployments/**"
      - "scripts/deploy.sh"
      - "scripts/install-watchdog.sh"
      - "scripts/watchdog.py"

jobs:
  changes:
    name: Detect changed areas
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    outputs:
      image_changed: ${{ steps.filter.outputs.image_changed }}
      deploy_services: ${{ steps.filter.outputs.deploy_services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          INPUT_DEPLOY_SERVICES: ${{ inputs.deploy_services }}
        run: |
          validate_deploy_services() {
            for service in $1; do
              case "$service" in
                web-bridge) ;;
                *)
                  echo "Unsupported deploy_services entry: $service" >&2
                  echo "Allowed services: web-bridge" >&2
                  exit 2
                  ;;
              esac
            done
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_DEPLOY_SERVICES:-}" ]; then
              validate_deploy_services "$INPUT_DEPLOY_SERVICES"
              deploy_services="$INPUT_DEPLOY_SERVICES"
            else
              deploy_services="web-bridge"
            fi
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "$CURRENT_SHA")"
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          image_changed=false
          deploy_services=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              Dockerfile|.dockerignore|backend/*|frontend/*|test_rpc_readonly.py|test_rpc_trade_flow.py|deployments/*|scripts/deploy.sh|scripts/install-watchdog.sh|scripts/watchdog.py|.github/workflows/cd.yml)
                image_changed=true
                deploy_services="web-bridge"
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "image_changed=$image_changed" >> "$GITHUB_OUTPUT"
          echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build and deploy on Macmini
    needs: changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.image_changed == 'true' && needs.changes.outputs.deploy_services != ''
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          APP_ENV_SECRET: ${{ secrets.APP_ENV }}
          JWT_SECRET_KEY_SECRET: ${{ secrets.JWT_SECRET_KEY }}
          MONITOR_ENABLED_SECRET: ${{ secrets.MONITOR_ENABLED }}
          TELEGRAM_ENABLED_SECRET: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
            printf '%s\n' "$DEPLOY_ENV_FILE" > .deploy.env
          elif [ -f backend/.env ]; then
            cp backend/.env .deploy.env
          else
            echo "Missing deploy env. Add GitHub secret DEPLOY_ENV_FILE or keep backend/.env on the self-hosted runner." >&2
            exit 1
          fi
          if [ -n "${TELEGRAM_BOT_TOKEN_SECRET:-}" ] && [ -n "${TELEGRAM_CHAT_ID_SECRET:-}" ]; then
            python3 - .deploy.env <<'PY'
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          managed_keys = {
              "APP_ENV",
              "JWT_SECRET_KEY",
              "MONITOR_ENABLED",
              "TELEGRAM_ENABLED",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
          }
          lines = env_path.read_text(encoding="utf-8").splitlines()
          kept = []
          for line in lines:
              stripped = line.strip()
              key = stripped.split("=", 1)[0].strip() if "=" in stripped and not stripped.startswith("#") else ""
              if key in managed_keys:
                  continue
              kept.append(line)

          overlay = {
              "APP_ENV": os.getenv("APP_ENV_SECRET") or "production",
              "JWT_SECRET_KEY": os.environ["JWT_SECRET_KEY_SECRET"],
              "MONITOR_ENABLED": os.getenv("MONITOR_ENABLED_SECRET") or "true",
              "TELEGRAM_ENABLED": os.getenv("TELEGRAM_ENABLED_SECRET") or "true",
              "TELEGRAM_BOT_TOKEN": os.environ["TELEGRAM_BOT_TOKEN_SECRET"],
              "TELEGRAM_CHAT_ID": os.environ["TELEGRAM_CHAT_ID_SECRET"],
          }
          output = "\n".join(kept).rstrip() + "\n\n"
          output += "\n".join(f"{key}={value}" for key, value in overlay.items()) + "\n"
          env_path.write_text(output, encoding="utf-8")
          PY
          fi
          chmod 600 .deploy.env

      - name: Prepare deployment directory
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          mkdir -p "$path/deployments" "$path/scripts" "$path/logs/watchdog" "$path/source"
          cp deployments/docker-compose.prod.yml "$path/deployments/docker-compose.prod.yml"
          cp deployments/com.vnpy-web-bridge.watchdog.plist "$path/deployments/com.vnpy-web-bridge.watchdog.plist"
          cp scripts/deploy.sh "$path/scripts/deploy.sh"
          cp scripts/install-watchdog.sh "$path/scripts/install-watchdog.sh"
          cp scripts/watchdog.py "$path/scripts/watchdog.py"
          cp .deploy.env "$path/.env"
          rsync -az --delete \
            --exclude .git \
            --exclude .venv \
            --exclude node_modules \
            --exclude frontend/dist \
            --exclude __pycache__ \
            --exclude .pytest_cache \
            ./ "$path/source/"
          chmod +x "$path/scripts/deploy.sh" "$path/scripts/install-watchdog.sh" "$path/scripts/watchdog.py"
          chmod 600 "$path/.env"

      - name: Build image on Macmini
        timeout-minutes: 20
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REPO: vnpy-web-bridge
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:${PATH:-}"
          host="${DEPLOY_SSH_HOST:-127.0.0.1}"
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-fujun}"
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          key="$path/.ssh/deploy_ed25519"
          test -f "$key" || { echo "Missing deploy SSH key: $key" >&2; exit 1; }
          ssh -i "$key" -p "$port" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" \
            "cd '$path/source' && PATH='/Applications/Docker.app/Contents/Resources/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin' docker build --progress=plain -t '$IMAGE_REPO:$IMAGE_TAG' -t '$IMAGE_REPO:latest' ."

      - name: Deploy via docker compose
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REPO: vnpy-web-bridge
          IMAGE_TAG: sha-${{ github.sha }}
          DEPLOY_SERVICES: ${{ needs.changes.outputs.deploy_services }}
          DEPLOY_SKIP_PULL: "true"
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:${PATH:-}"
          host="${DEPLOY_SSH_HOST:-127.0.0.1}"
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-fujun}"
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          key="$path/.ssh/deploy_ed25519"
          test -f "$key" || { echo "Missing deploy SSH key: $key" >&2; exit 1; }
          ssh -i "$key" -p "$port" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" \
            "DEPLOY_PATH='$path' IMAGE_REPO='$IMAGE_REPO' IMAGE_TAG='$IMAGE_TAG' DEPLOY_SERVICES='$DEPLOY_SERVICES' DEPLOY_SKIP_PULL='$DEPLOY_SKIP_PULL' bash '$path/scripts/deploy.sh'"

      - name: Install host watchdog
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:${PATH:-}"
          host="${DEPLOY_SSH_HOST:-127.0.0.1}"
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-fujun}"
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          key="$path/.ssh/deploy_ed25519"
          test -f "$key" || { echo "Missing deploy SSH key: $key" >&2; exit 1; }
          ssh -i "$key" -p "$port" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" \
            "DEPLOY_PATH='$path' bash '$path/scripts/install-watchdog.sh' install && DEPLOY_PATH='$path' bash '$path/scripts/install-watchdog.sh' status | sed -n '1,80p'"
