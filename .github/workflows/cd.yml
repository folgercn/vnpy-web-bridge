name: CD

on:
  workflow_dispatch:
    inputs:
      deploy_services:
        description: "Space-separated compose services to deploy. Empty uses safe defaults."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/cd.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - "test_rpc_readonly.py"
      - "test_rpc_trade_flow.py"
      - "deployments/**"
      - "scripts/deploy.sh"

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      image_changed: ${{ steps.filter.outputs.image_changed }}
      deploy_services: ${{ steps.filter.outputs.deploy_services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          INPUT_DEPLOY_SERVICES: ${{ inputs.deploy_services }}
        run: |
          validate_deploy_services() {
            for service in $1; do
              case "$service" in
                web-bridge) ;;
                *)
                  echo "Unsupported deploy_services entry: $service" >&2
                  echo "Allowed services: web-bridge" >&2
                  exit 2
                  ;;
              esac
            done
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_DEPLOY_SERVICES:-}" ]; then
              validate_deploy_services "$INPUT_DEPLOY_SERVICES"
              deploy_services="$INPUT_DEPLOY_SERVICES"
            else
              deploy_services="web-bridge"
            fi
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "$CURRENT_SHA")"
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          image_changed=false
          deploy_services=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              Dockerfile|.dockerignore|backend/*|frontend/*|test_rpc_readonly.py|test_rpc_trade_flow.py|deployments/*|scripts/deploy.sh|.github/workflows/cd.yml)
                image_changed=true
                deploy_services="web-bridge"
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "image_changed=$image_changed" >> "$GITHUB_OUTPUT"
          echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and publish image
    needs: changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.image_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vnpy-web-bridge-app
          tags: |
            type=ref,event=branch
            type=raw,value=sha-${{ github.sha }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Macmini over SSH
    needs: [changes, docker]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.image_changed == 'true' && needs.changes.outputs.deploy_services != '' && needs.docker.result == 'success'
    runs-on: [self-hosted, macOS, ARM64, vnpy-web-bridge]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
            printf '%s\n' "$DEPLOY_ENV_FILE" > .deploy.env
          elif [ -f backend/.env ]; then
            cp backend/.env .deploy.env
          else
            echo "Missing deploy env. Add GitHub secret DEPLOY_ENV_FILE or keep backend/.env on the self-hosted runner." >&2
            exit 1
          fi
          chmod 600 .deploy.env

      - name: Sync deployment files
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          : "${DEPLOY_SSH_PASSWORD:?Missing DEPLOY_SSH_PASSWORD secret}"
          host="${DEPLOY_SSH_HOST:-192.168.100.89}"
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-fujun}"
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          ssh_base=(sshpass -p "$DEPLOY_SSH_PASSWORD" ssh -p "$port" -o StrictHostKeyChecking=accept-new "$user@$host")
          scp_base=(sshpass -p "$DEPLOY_SSH_PASSWORD" scp -P "$port" -o StrictHostKeyChecking=accept-new)
          "${ssh_base[@]}" "mkdir -p '$path/deployments' '$path/scripts' '$path/logs'"
          "${scp_base[@]}" deployments/docker-compose.prod.yml "$user@$host:$path/deployments/docker-compose.prod.yml"
          "${scp_base[@]}" scripts/deploy.sh "$user@$host:$path/scripts/deploy.sh"
          "${scp_base[@]}" .deploy.env "$user@$host:$path/.env"
          "${ssh_base[@]}" "chmod +x '$path/scripts/deploy.sh' && chmod 600 '$path/.env'"

      - name: Deploy via docker compose
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/vnpy-web-bridge-app
          IMAGE_TAG: sha-${{ github.sha }}
          DEPLOY_SERVICES: ${{ needs.changes.outputs.deploy_services }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : "${DEPLOY_SSH_PASSWORD:?Missing DEPLOY_SSH_PASSWORD secret}"
          host="${DEPLOY_SSH_HOST:-192.168.100.89}"
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-fujun}"
          path="${DEPLOY_PATH:-/Users/fujun/services/vnpy-web-bridge}"
          sshpass -p "$DEPLOY_SSH_PASSWORD" ssh -p "$port" -o StrictHostKeyChecking=accept-new "$user@$host" \
            "DEPLOY_PATH='$path' IMAGE_REPO='$IMAGE_REPO' IMAGE_TAG='$IMAGE_TAG' DEPLOY_SERVICES='$DEPLOY_SERVICES' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash '$path/scripts/deploy.sh'"
