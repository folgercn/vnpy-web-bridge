services:
  web-bridge:
    image: ${IMAGE_REPO:-ghcr.io/folgercn/vnpy-web-bridge-app}:${IMAGE_TAG:-latest}
    container_name: vnpy-web-bridge
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/status', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
