services:
  questdb:
    image: questdb/questdb:9.4.3
    container_name: vnpy-web-bridge-questdb
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    volumes:
      - questdb-data:/var/lib/questdb
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -lc '</dev/tcp/127.0.0.1/8812'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: vnpy-web-bridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vnpy}
      POSTGRES_USER: ${POSTGRES_USER:-vnpy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnpy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-bridge:
    image: ${IMAGE_REPO:-ghcr.io/folgercn/vnpy-web-bridge-app}:${IMAGE_TAG:-latest}
    container_name: vnpy-web-bridge
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      QUESTDB_PG_DSN: ${QUESTDB_PG_DSN:-postgresql://admin:quest@questdb:8812/qdb}
      QUESTDB_TICK_SPOOL_DIR: ${QUESTDB_TICK_SPOOL_DIR:-/app/tick-spool}
      DATABASE_URL: ${DATABASE_URL:-postgresql://vnpy:vnpy@postgres:5432/vnpy}
    depends_on:
      questdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../logs:/app/logs
      - tick-spool:/app/tick-spool
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health/live', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  questdb-data:
  tick-spool:
  postgres-data:
